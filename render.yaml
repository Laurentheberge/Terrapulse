services:
  - type: web
    name: terrapulse-api
    env: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12
      - key: ALLOWED_ORIGINS
        value: https://hackartonic.web.app,https://hackartonic.firebaseapp.com
      - key: FIREBASE_PROJECT_ID
        sync: false
      - key: FIREBASE_PRIVATE_KEY
        sync: false
      - key: FIREBASE_CLIENT_EMAIL
        sync: false
      - key: PROTECTED_AUTHORITIES
        value: azawelauren@gmail.com
